# Fortigate — Configuração CLI (FortiOS)
# VPN IPSec Route-Based com BGP
# WAN: 100.64.0.1 | Mgmt: 192.168.50.10

# Phase 1
config vpn ipsec phase1-interface
    edit "VPN-PA-P1"
        set interface "wan1"
        set ike-version 2
        set keylife 86400
        set proposal aes256-sha256
        set dhgrp 14
        set remote-gw 100.64.0.254
        set psksecret chave_pre_compartilhada
        set ip 169.255.1.1 255.255.255.252
        set remote-ip 169.255.1.2
    next
end

# Phase 2 — any/any (route-based)
config vpn ipsec phase2-interface
    edit "VPN-PA-P2"
        set phase1name "VPN-PA-P1"
        set proposal aes256-sha256
        set pfs enable
        set dhgrp 14
        set keylifeseconds 3600
        set src-subnet 0.0.0.0 0.0.0.0
        set dst-subnet 0.0.0.0 0.0.0.0
    next
end

# Política de firewall
config firewall policy
    edit 0
        set name "LAN-to-PA-VPN"
        set srcintf "internal"
        set dstintf "VPN-PA-P1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
    next
end

# BGP
config router bgp
    set as 65001
    set router-id 169.255.1.1
    config neighbor
        edit "169.255.1.2"
            set remote-as 65002
            set update-source "VPN-PA-P1"
            set soft-reconfiguration enable
        next
    end
    config network
        edit 1
            set prefix 192.168.10.0 255.255.255.0
        next
    end
end
