# Palo Alto — Configuração CLI (PAN-OS set commands)
# VPN IPSec Route-Based com BGP
# WAN: 100.64.0.254 | Mgmt: 192.168.100.10

# IKE Crypto Profile
set network ike crypto-profiles ike-crypto-profiles IKE-AES256-SHA256 encryption aes-256-cbc
set network ike crypto-profiles ike-crypto-profiles IKE-AES256-SHA256 hash sha256
set network ike crypto-profiles ike-crypto-profiles IKE-AES256-SHA256 dh-group group14
set network ike crypto-profiles ike-crypto-profiles IKE-AES256-SHA256 lifetime seconds 86400

# IPSec Crypto Profile
set network ike crypto-profiles ipsec-crypto-profiles IPSEC-AES256-SHA256 esp encryption aes-256-cbc
set network ike crypto-profiles ipsec-crypto-profiles IPSEC-AES256-SHA256 esp authentication sha256
set network ike crypto-profiles ipsec-crypto-profiles IPSEC-AES256-SHA256 dh-group group14
set network ike crypto-profiles ipsec-crypto-profiles IPSEC-AES256-SHA256 lifetime seconds 3600

# IKE Gateway
set network ike gateway GW-FORTIGATE authentication pre-shared-key key chave_pre_compartilhada
set network ike gateway GW-FORTIGATE protocol ikev2 ike-crypto-profile IKE-AES256-SHA256
set network ike gateway GW-FORTIGATE protocol ikev2 dpd enable yes
set network ike gateway GW-FORTIGATE protocol version ikev2
set network ike gateway GW-FORTIGATE local-address interface ethernet1/1
set network ike gateway GW-FORTIGATE peer-address ip 100.64.0.1

# IPSec Tunnel (route-based, sem proxy IDs)
set network tunnel ipsec TUNNEL-FORTIGATE tunnel-interface tunnel.1
set network tunnel ipsec TUNNEL-FORTIGATE ike gateway GW-FORTIGATE
set network tunnel ipsec TUNNEL-FORTIGATE ike ipsec-crypto-profile IPSEC-AES256-SHA256

# IP da tunnel interface
set network interface tunnel units tunnel.1 ip 169.255.1.2/30

# BGP
set network virtual-router default protocol bgp enable yes
set network virtual-router default protocol bgp router-id 169.255.1.2
set network virtual-router default protocol bgp local-as 65002
set network virtual-router default protocol bgp peer-group VPN-PEERS type ebgp remove-private-as yes
set network virtual-router default protocol bgp peer-group VPN-PEERS peer FORTIGATE enable yes
set network virtual-router default protocol bgp peer-group VPN-PEERS peer FORTIGATE peer-address ip 169.255.1.1
set network virtual-router default protocol bgp peer-group VPN-PEERS peer FORTIGATE peer-as 65001
set network virtual-router default protocol bgp peer-group VPN-PEERS peer FORTIGATE local-address interface tunnel.1
set network virtual-router default protocol bgp peer-group VPN-PEERS peer FORTIGATE local-address ip 169.255.1.2/30
set network virtual-router default protocol bgp redistribution-profile CONNECTED action redist yes
set network virtual-router default protocol bgp redistribution-profile CONNECTED filter type connected
set network virtual-router default protocol bgp redistribution-profile CONNECTED priority 1

# Security Policy
set vsys vsys1 rulebase security rules LAN-to-FG-VPN from trust
set vsys vsys1 rulebase security rules LAN-to-FG-VPN to vpn
set vsys vsys1 rulebase security rules LAN-to-FG-VPN source any
set vsys vsys1 rulebase security rules LAN-to-FG-VPN destination any
set vsys vsys1 rulebase security rules LAN-to-FG-VPN application any
set vsys vsys1 rulebase security rules LAN-to-FG-VPN service application-default
set vsys vsys1 rulebase security rules LAN-to-FG-VPN action allow

commit
