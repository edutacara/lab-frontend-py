<div class="card">
  <div class="card-title">Conexão com o Switch</div>
  <div class="grid-2">
    <div class="field">
      <label>Host / IP</label>
      <input type="text" id="host" placeholder="192.168.1.1" />
    </div>
    <div class="field">
      <label>Porta SSH</label>
      <input type="number" id="port" value="22" />
    </div>
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="username" placeholder="admin" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="password" placeholder="••••••" />
    </div>
    <div class="field" style="grid-column: span 2;">
      <label>Enable Secret <span style="color:#475569">(opcional)</span></label>
      <input type="password" id="secret" placeholder="••••••" />
    </div>
  </div>
</div>
